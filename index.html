  <style>
    :root {
      color-scheme: light dark;
      --canvas: #f4f7f5;
      --surface: #fbfdfc;
      --text: #17231b;
      --muted: #56645b;
      --line: #cfd8d2;
      --accent: #1d6f42;
      --accent-strong: #165834;
      --accent-soft: #dcebe1;
      --button-text: #f7fbf8;
      --focus: #0969da;
      --shadow: rgb(37 74 50 / 16%);
      --radius: 18px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--canvas);
    }

    body {
      min-width: 320px;
      min-height: 100dvh;
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 100% 25%,
        var(--canvas);
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 10px 14px;
      border-radius: var(--radius);
      color: var(--button-text);
      background: var(--accent-strong);
      transform: translateY(-160%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    main {
      display: grid;
      min-height: calc(100dvh - 72px);
      place-items: center;
      padding: clamp(32px, 7vw, 88px) clamp(20px, 6vw, 72px);
    }

    .profile {
      display: grid;
      width: min(100%, 1120px);
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
      align-items: center;
      gap: clamp(52px, 9vw, 112px);
    }

    .profile-copy {
      position: relative;
      z-index: 1;
    }

    .profile-label {
      width: fit-content;
      margin: 0 0 24px;
      padding-bottom: 8px;
      border-bottom: 3px solid var(--accent);
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 760;
      letter-spacing: 0.16em;
      line-height: 1.4;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3rem, 7vw, 6.5rem);
      font-weight: 780;
      letter-spacing: -0.065em;
      line-height: 0.94;
    }

    h1 span {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.48em;
      font-weight: 610;
      letter-spacing: -0.035em;
      line-height: 1.08;
    }

    .profile-description {
      max-width: 34rem;
      margin: 32px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.18rem);
      line-height: 1.85;
    }

    .profile-link {
      display: inline-flex;
      min-height: 52px;
      margin-top: 36px;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border: 2px solid var(--accent-strong);
      border-radius: var(--radius);
      color: var(--button-text);
      background: var(--accent-strong);
      box-shadow: 0 14px 30px var(--shadow);
      font-size: 0.96rem;
      font-weight: 720;
      line-height: 1.25;
      text-decoration: none;
      white-space: nowrap;
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease;
    }

    .profile-link:hover {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 18px 36px var(--shadow);
      transform: translateY(-2px);
    }

    .profile-link:active {
      box-shadow: 0 8px 18px var(--shadow);
      transform: translateY(1px);
    }

    .profile-link:focus-visible,
    .skip-link:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 4px;
    }

    .portrait {
      position: relative;
      width: min(100%, 440px);
      margin: 0 0 0 auto;
      isolation: isolate;
    }

    .portrait::before {
      position: absolute;
      inset: 8% -7% -8% 8%;
      z-index: -1;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: var(--accent-soft);
      content: "";
    }

    .portrait img {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 26px 54px var(--shadow);
      object-fit: cover;
    }

    footer {
      display: flex;
      min-height: 72px;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px clamp(20px, 6vw, 72px);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    footer p {
      margin: 0;
    }

    @media (max-width: 820px) {
      body {
        background:
          linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 100% 20%,
          var(--canvas);
      }

      main {
        min-height: auto;
        padding: 52px 24px 76px;
      }

      .profile {
        grid-template-columns: 1fr;
        gap: 52px;
      }

      .profile-copy {
        order: 0;
      }

      .portrait {
        order: 1;
        width: min(84vw, 360px);
        margin: 0 auto;
      }

      h1 {
        font-size: clamp(3rem, 14vw, 5rem);
      }

      .profile-description {
        margin-top: 26px;
      }

      .profile-link {
        margin-top: 30px;
      }
    }

    @media (max-width: 520px) {
      main {
        padding-inline: 20px;
      }

      .profile-label {
        margin-bottom: 20px;
      }

      .profile-link {
        width: 100%;
      }

      footer {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #0d1410;
        --surface: #121b15;
        --text: #edf5ef;
        --muted: #a4b2a8;
        --line: #304036;
        --accent: #56d364;
        --accent-strong: #287a46;
        --accent-soft: #17291d;
        --button-text: #f4faf5;
        --focus: #58a6ff;
        --shadow: rgb(0 0 0 / 38%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
